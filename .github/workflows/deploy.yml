name: deploy

on:
  push:
    branches: [main]
    paths:
      - "terraform/**"
      - "ansible/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:
    inputs:
      replace_workers:
        description: >-
          Force-replace both workers. Needed when the running instances can no
          longer be started (spot capacity) or otherwise drift from the code in
          a way Terraform can't see — instance_market_options only applies at
          creation, so flipping use_spot never converts a live instance.
          Destroys the worker root volumes; the GitLab certificate survives via
          the S3 copy, but GitLab's data does not.
        type: boolean
        default: false
      replace_cp:
        description: >-
          Force-replace the control plane, for the same reason. Note that a
          spot instance also cannot be RESIZED: Terraform stops it, calls
          ModifyInstanceAttribute, gets UnsupportedOperation, and leaves it
          stopped — so a cp still on spot blocks every apply once its type
          drifts from the code. Rebuilds k3s (server state, NAT config) from
          scratch; the EIP is a separate resource and is re-associated, so
          the public address, DNS record and certificate are unaffected.
        type: boolean
        default: false
      cert_only:
        description: >-
          Run only the certificate restore/backup against S3, skipping the
          rest of the playbook. Proves the restore path works before you
          rely on it during a rebuild — it writes the Secret and nothing
          else, so a running cluster is unaffected.
        type: boolean
        default: false

# The runner holds no AWS credentials — it assumes the deployer role
# (created by bootstrap/) via GitHub's OIDC federation, valid only for
# this repo's main branch.
permissions:
  id-token: write
  contents: read

concurrency:
  group: gitlab-demo-terraform
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform
    env:
      TF_IN_AUTOMATION: "true"
      TF_VAR_region: ${{ vars.AWS_REGION }}
    steps:
      - uses: actions/checkout@v7

      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_wrapper: false

      - name: Point Terraform at remote state
        run: |
          # Must match bootstrap's generated backend_override.tf exactly.
          # Locking is S3-native (use_lockfile) — there is no DynamoDB table.
          cat > backend_override.tf <<EOF
          terraform {
            backend "s3" {
              bucket       = "${{ vars.TF_STATE_BUCKET }}"
              key          = "gitlab-demo/terraform.tfstate"
              region       = "${{ vars.AWS_REGION }}"
              use_lockfile = true
            }
          }
          EOF
          terraform init -input=false

      # Grants this runner SSH (22) and k3s API (6443) access for the run,
      # via ci_cidr — additive, so it doesn't evict the human admin_cidr.
      - name: Grant this runner admin access
        id: ip
        run: echo "cidr=$(curl -fsS https://checkip.amazonaws.com)/32" >> "$GITHUB_OUTPUT"

      - name: Terraform apply
        env:
          TF_VAR_admin_cidr: ${{ vars.ADMIN_CIDR }}
          TF_VAR_ci_cidr: ${{ steps.ip.outputs.cidr }}
          TF_VAR_domain: ${{ vars.GITLAB_DOMAIN }}
          TF_VAR_letsencrypt_email: ${{ vars.LETSENCRYPT_EMAIL }}
          TF_VAR_cert_bucket: ${{ vars.TF_STATE_BUCKET }}
          TF_VAR_acm_fallback: ${{ vars.ACM_FALLBACK || 'false' }}
          TF_VAR_cloudflare_zone_id: ${{ vars.CLOUDFLARE_ZONE_ID }}
          TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          TF_VAR_route53_zone_id: ${{ vars.ROUTE53_ZONE_ID }}
          TF_VAR_keycloak_issuer_url: ${{ vars.KEYCLOAK_ISSUER_URL }}
          TF_VAR_keycloak_client_id: ${{ vars.KEYCLOAK_CLIENT_ID }}
          # Falls back rather than passing through empty: an unset repo
          # variable would override the variables.tf default with "" and
          # leave the SSO button on the login page with no text at all.
          TF_VAR_keycloak_label: ${{ vars.KEYCLOAK_LABEL || 'Keycloak SSO' }}
          TF_VAR_keycloak_client_secret: ${{ secrets.KEYCLOAK_CLIENT_SECRET }}
        run: |
          terraform apply -auto-approve -input=false \
            ${{ inputs.replace_workers && '-replace=aws_instance.worker[0] -replace=aws_instance.worker[1]' || '' }} \
            ${{ inputs.replace_cp && '-replace=aws_instance.cp' || '' }}

      # The gitlab_cert role reaches S3 through scripts/aws, which uses the
      # runner's own CLI under the assumed role — no boto3, no collections,
      # and nothing AWS-aware ever installed on the cluster nodes.
      - name: Install Ansible
        run: python3 -m pip install --user ansible-core

      # cert_only exercises the S3 restore/backup path against the real
      # bucket and the real controller, without touching the cluster: the
      # restore just writes a Secret manifest, and the seed-cert
      # initContainer reads it only when a pod is recreated. Worth running
      # before any rebuild, because a rebuild whose restore fails has no
      # fallback once the weekly Let's Encrypt budget is spent.
      - name: Configure cluster (k3s + GitLab + runner)
        working-directory: ansible
        run: ansible-playbook site.yml ${{ inputs.cert_only && '--tags cert' || '' }}

      - name: Deployment summary
        run: |
          {
            echo "### GitLab demo platform deployed"
            echo "- **URL:** $(terraform output -raw gitlab_url)"
            echo "- **Registry:** $(terraform output -raw registry_host)"
            echo "- **DNS:** $(terraform output -raw dns_record)"
            echo "- Root password: \`terraform output -raw gitlab_root_password\` (from the shared state)"
          } >> "$GITHUB_STEP_SUMMARY"
