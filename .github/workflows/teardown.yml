name: teardown

# Stop the meter. Replaces the old `destroy` workflow.
#
# What this platform actually costs, on-demand in us-east-1 at the defaults
# (1x t3a.small + 2x m6a.large, 100 GiB of gp3, one Elastic IP):
#
#   ~$126/mo  the two m6a.large workers          <- almost all of it
#   ~$14/mo   the t3a.small control plane
#   ~$8/mo    100 GiB gp3 root volumes           <- survives `stop`, not destroy
#   ~$3.65/mo the Elastic IP                     <- billed even while detached
#   ~$0/mo    S3: a few KB of tfstate + one certificate
#
# So the bill is EC2, and `terraform destroy` is what ends it: instances,
# their root volumes, and the EIP all go together. The S3 side is rounding
# error — it is in here because leaving a certificate and a state file behind
# is untidy, not because it costs anything.
#
# Manual dispatch only. Nothing about this runs on a push.

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "teardown" to tear the platform down'
        required: true
      wipe_cert:
        description: >-
          Also delete the stored Let's Encrypt certificate from S3. Saves no
          money — leave OFF unless you are done with this hostname for good.
          The next deploy would then have nothing to restore and would spend
          one of Let's Encrypt's five weekly issuances for it.
        type: boolean
        default: false

permissions:
  id-token: write
  contents: read

concurrency:
  group: gitlab-demo-terraform
  cancel-in-progress: false

jobs:
  teardown:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform
    env:
      TF_IN_AUTOMATION: "true"
      TF_VAR_region: ${{ vars.AWS_REGION }}
      PROJECT: gitlab-demo
    steps:
      # A guard STEP, not `if:` on the job. The old destroy workflow gated the
      # job itself, so a typo skipped every step and the run still reported
      # success — a green check next to a teardown that destroyed nothing.
      - name: Check the confirmation
        working-directory: .
        run: |
          if [ "${{ inputs.confirm }}" != "teardown" ]; then
            echo "::error::confirmation was '${{ inputs.confirm }}', expected 'teardown' — nothing was touched"
            exit 1
          fi

      - uses: actions/checkout@v7

      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_wrapper: false

      - name: Point Terraform at remote state
        run: |
          # Must match bootstrap's generated backend_override.tf exactly.
          # Locking is S3-native (use_lockfile) — there is no DynamoDB table.
          cat > backend_override.tf <<EOF
          terraform {
            backend "s3" {
              bucket       = "${{ vars.TF_STATE_BUCKET }}"
              key          = "gitlab-demo/terraform.tfstate"
              region       = "${{ vars.AWS_REGION }}"
              use_lockfile = true
            }
          }
          EOF
          terraform init -input=false

      # What is on the meter right now, so the summary can be a before/after
      # rather than a claim. Also reads the cert location BEFORE the destroy,
      # because afterwards there is no state left to derive it from.
      - name: What is currently billing
        id: before
        run: |
          aws ec2 describe-instances \
            --filters "Name=tag:Project,Values=$PROJECT" \
                      "Name=instance-state-name,Values=pending,running,stopping,stopped" \
            --query 'Reservations[].Instances[].[InstanceId,InstanceType,State.Name]' \
            --output text | tee /tmp/before.txt
          {
            echo "instances=$(wc -l < /tmp/before.txt)"
            url=$(terraform output -raw gitlab_url 2>/dev/null || true)
            echo "host=${url#*://}"
            echo "bucket=$(terraform output -raw cert_bucket 2>/dev/null || true)"
          } >> "$GITHUB_OUTPUT"

      # Destroy needs the same inputs as apply: Terraform has to be able to
      # authenticate to Cloudflare to delete the DNS record it owns, and the
      # inventory resource's preconditions still evaluate on the way down.
      # This is the step that ends the bill — instances, root volumes and the
      # Elastic IP are all in this state file.
      - name: Terraform destroy
        env:
          TF_VAR_domain: ${{ vars.GITLAB_DOMAIN }}
          TF_VAR_letsencrypt_email: ${{ vars.LETSENCRYPT_EMAIL }}
          TF_VAR_cert_bucket: ${{ vars.TF_STATE_BUCKET }}
          TF_VAR_cloudflare_zone_id: ${{ vars.CLOUDFLARE_ZONE_ID }}
          TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          TF_VAR_route53_zone_id: ${{ vars.ROUTE53_ZONE_ID }}
          TF_VAR_keycloak_issuer_url: ${{ vars.KEYCLOAK_ISSUER_URL }}
          TF_VAR_keycloak_client_id: ${{ vars.KEYCLOAK_CLIENT_ID }}
          TF_VAR_keycloak_label: ${{ vars.KEYCLOAK_LABEL || 'Keycloak SSO' }}
          TF_VAR_keycloak_client_secret: ${{ secrets.KEYCLOAK_CLIENT_SECRET }}
        run: terraform destroy -auto-approve -input=false

      # Only after a clean destroy: if the teardown failed halfway, the
      # certificate is the one thing worth still having.
      #
      # Note this leaves the object's older VERSIONS behind — the bucket is
      # versioned and the deployer role deliberately has s3:DeleteObject but
      # not s3:DeleteObjectVersion, so a delete marker is as far as CI can go.
      # That is bytes, and expanding the CI role's blast radius to tidy them
      # is a bad trade. Empty the bucket from a laptop if you truly need to.
      - name: Wipe the stored certificate
        if: inputs.wipe_cert
        env:
          BUCKET: ${{ steps.before.outputs.bucket }}
          HOST: ${{ steps.before.outputs.host }}
        run: |
          if [ -z "$BUCKET" ] || [ -z "$HOST" ]; then
            echo "::warning::no cert_bucket/host in state — nothing to wipe"
            exit 0
          fi
          echo "Deleting s3://$BUCKET/certs/$HOST/"
          aws s3 rm "s3://$BUCKET/certs/$HOST/" --recursive

      # Prove it rather than assert it. Terraform reporting success and the
      # account being empty are different claims, and orphaned volumes or a
      # stranded Elastic IP bill exactly the same whether or not state
      # believes they are gone.
      - name: Prove the meter is off
        if: always()
        run: |
          echo "### Still billable" >> "$GITHUB_STEP_SUMMARY"

          left=$(aws ec2 describe-instances \
            --filters "Name=tag:Project,Values=$PROJECT" \
                      "Name=instance-state-name,Values=pending,running,stopping,stopped" \
            --query 'Reservations[].Instances[].[InstanceId,InstanceType,State.Name]' \
            --output text)
          vols=$(aws ec2 describe-volumes \
            --filters "Name=status,Values=available" \
            --query 'Volumes[].[VolumeId,Size,State]' --output text)
          eips=$(aws ec2 describe-addresses \
            --filters "Name=tag:Project,Values=$PROJECT" \
            --query 'Addresses[].[PublicIp,AllocationId]' --output text)

          for pair in "instances:$left" "unattached volumes:$vols" "elastic IPs:$eips"; do
            label=${pair%%:*}; body=${pair#*:}
            if [ -z "$body" ]; then
              echo "- **$label:** none" >> "$GITHUB_STEP_SUMMARY"
            else
              echo "- **$label:** STILL PRESENT" >> "$GITHUB_STEP_SUMMARY"
              printf '```\n%s\n```\n' "$body" >> "$GITHUB_STEP_SUMMARY"
              echo "::warning::$label still exist after teardown — these are still billing"
            fi
          done

          if [ -n "$left$vols$eips" ]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "Something survived the destroy. Check the Terraform step above before assuming the bill stopped." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Teardown summary
        if: always()
        working-directory: .
        run: |
          {
            echo ""
            echo "### Teardown"
            echo "- **Was billing before this run:** ${{ steps.before.outputs.instances }} instance(s)"
            echo "- **AWS infrastructure:** \`terraform destroy\` — ${{ job.status }}"
            if [ "${{ inputs.wipe_cert }}" = "true" ]; then
              echo "- **Certificate:** deleted. The next deploy spends a Let's Encrypt issuance (5/week per hostname)."
            else
              echo "- **Certificate:** kept in S3 — a rebuild restores it instead of asking Let's Encrypt. Costs nothing."
            fi
            echo "- **State bucket:** kept. It holds the Terraform state; deleting it means re-running \`bootstrap/\` before you can deploy again."
          } >> "$GITHUB_STEP_SUMMARY"
