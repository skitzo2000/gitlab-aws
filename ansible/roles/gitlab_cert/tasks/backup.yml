---
# Push the live certificate back to S3 after GitLab is healthy. Covers both
# the first issuance and every later renewal: omnibus renews in place inside
# /etc/gitlab/ssl, and each deploy re-uploads whatever is currently there.
#
# Best-effort by design — failing to back up must never fail a deploy of an
# otherwise healthy cluster.

- name: Read the live certificate out of the GitLab pod
  ansible.builtin.command:
    argv:
      - kubectl
      - -n
      - gitlab
      - exec
      - deploy/gitlab
      - --
      - tar
      - -cf
      - "-"
      - -C
      - /etc/gitlab/ssl
      - "{{ cert_crt_name }}"
      - "{{ cert_key_name }}"
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  register: cert_tar
  failed_when: false
  changed_when: false

- name: Report a certificate that could not be read
  ansible.builtin.debug:
    msg: >-
      Could not read /etc/gitlab/ssl out of the GitLab pod — nothing was
      backed up this run. The cluster is unaffected; the next deploy retries.
  when: cert_tar.rc != 0

- name: Back it up
  when: cert_tar.rc == 0
  delegate_to: localhost
  become: false
  block:
    - name: Create a staging directory
      ansible.builtin.tempfile:
        state: directory
        prefix: gitlab-cert.
      register: stage
      changed_when: false

    # The tar arrives as raw bytes on stdout; write it back out byte-exact
    # rather than round-tripping through a string.
    - name: Unpack the pair
      ansible.builtin.shell:
        cmd: tar -xf - -C {{ stage.path | quote }}
        stdin: "{{ cert_tar.stdout }}"
      changed_when: false

    - name: Store the certificate and key
      ansible.builtin.command:
        argv:
          - "{{ aws_cli }}"
          - s3
          - cp
          - "{{ stage.path }}/{{ item }}"
          - "s3://{{ cert_bucket }}/{{ cert_prefix }}/{{ item }}"
      environment:
        AWS_REGION: "{{ aws_region | default('us-east-1') }}"
      loop:
        - "{{ cert_crt_name }}"
        - "{{ cert_key_name }}"

    - name: Drop the staging copy
      ansible.builtin.file:
        path: "{{ stage.path }}"
        state: absent
      changed_when: false
