---
- name: Download k3s installer
  ansible.builtin.get_url:
    url: https://get.k3s.io
    dest: /usr/local/bin/k3s-install.sh
    mode: "0755"

# The control-plane taint is the cordon: nothing but k3s itself ever runs
# here, so a t3a.small suffices. Traefik is disabled — svclb exposes GitLab
# directly and the small node has no RAM to spare.
- name: Install k3s server (tainted control plane)
  ansible.builtin.command: /usr/local/bin/k3s-install.sh
  args:
    creates: /usr/local/bin/k3s
  environment:
    INSTALL_K3S_EXEC: >-
      server
      --token {{ k3s_token }}
      --node-taint node-role.kubernetes.io/control-plane=true:NoSchedule
      --disable traefik
      --write-kubeconfig-mode 0644
      --tls-san {{ cp_public_ip }}

- name: Wait for the k3s API
  ansible.builtin.wait_for:
    port: 6443
    timeout: 180

# Replaced workers leave dead Node objects and a PV pinned to them, which
# silently strands the GitLab pod. Runs before any manifest is applied.
- name: Prune cluster objects left behind by replaced workers
  ansible.builtin.include_tasks: prune_nodes.yml
