---
- name: Deploy Gitea manifest (k3s auto-applies)
  ansible.builtin.template:
    src: gitea.yaml.j2
    dest: "{{ k3s_manifests_dir }}/gitea.yaml"
    mode: "0600"

- name: Wait for Gitea to be ready
  ansible.builtin.uri:
    url: "{{ gitea_url }}/api/healthz"
    status_code: 200
  register: gitea_health
  until: gitea_health.status == 200
  retries: 40
  delay: 15

# Gitea has no env/API path to seed the first admin — one CLI call.
# ("admin" and "root" are reserved usernames, hence gitea_admin.)
- name: Create the Gitea admin user
  ansible.builtin.command:
    argv:
      - kubectl
      - -n
      - gitea
      - exec
      - deploy/gitea
      - --
      - su
      - git
      - -c
      - >-
        gitea admin user create --admin --username gitea_admin
        --password '{{ gitea_admin_password }}'
        --email gitea_admin@{{ gitea_host }}
        --must-change-password=false
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  register: gitea_admin
  changed_when: gitea_admin.rc == 0
  failed_when: gitea_admin.rc != 0 and 'already exists' not in gitea_admin.stderr
