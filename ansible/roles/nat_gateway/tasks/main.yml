---
# The cp doubles as the private subnet's NAT instance ($0 vs a managed NAT
# gateway): Terraform points the workers' default route at the cp's ENI and
# disables its source/dest check; this role does the OS half. A systemd
# oneshot (rather than iptables-persistent) applies it on every boot, so
# spot stop/starts self-heal without snapshotting k3s' own iptables rules.
#
# MUST run before the workers play: they have no egress (not even the k3s
# installer download) until this is in place.

- name: Install NAT setup script
  ansible.builtin.copy:
    dest: /usr/local/sbin/nat-gateway.sh
    mode: "0755"
    content: |
      #!/bin/sh
      # Forward + masquerade for the private subnet ({{ vpc_cidr }}).
      set -e
      sysctl -w net.ipv4.ip_forward=1
      iptables -t nat -C POSTROUTING -s {{ vpc_cidr }} ! -d {{ vpc_cidr }} -j MASQUERADE 2>/dev/null \
        || iptables -t nat -A POSTROUTING -s {{ vpc_cidr }} ! -d {{ vpc_cidr }} -j MASQUERADE
  register: nat_script

- name: Install NAT systemd unit
  ansible.builtin.copy:
    dest: /etc/systemd/system/nat-gateway.service
    mode: "0644"
    content: |
      [Unit]
      Description=NAT for the private worker subnet
      After=network-online.target
      Wants=network-online.target

      [Service]
      Type=oneshot
      ExecStart=/usr/local/sbin/nat-gateway.sh
      RemainAfterExit=yes

      [Install]
      WantedBy=multi-user.target
  register: nat_unit

- name: Enable and apply NAT now
  ansible.builtin.systemd:
    name: nat-gateway
    enabled: true
    state: "{{ (nat_script.changed or nat_unit.changed) | ternary('restarted', 'started') }}"
    daemon_reload: true
