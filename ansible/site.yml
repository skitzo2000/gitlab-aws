---
# The full deploy as ordered phases. Each phase is also a standalone playbook
# (CI runs them as separate named steps so the flow is visible in GitHub);
# run them all at once for a local deploy:
#
#   ansible-playbook site.yml
#
# Idempotent — re-run freely. Order matters: the certificate is restored
# before GitLab starts and backed up after it is healthy.

- import_playbook: 01-platform.yml
- import_playbook: 02-cert-restore.yml
- import_playbook: 03-gitlab.yml
- import_playbook: 04-runner.yml
- import_playbook: 05-cert-backup.yml
