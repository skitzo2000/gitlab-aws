# Spaceballs-the-docker: built by the pipeline, pushed to the self-hosted
# registry. Runs on the hosted runner (kubernetes executor, privileged dind).
#
# With a real domain configured (HTTPS via Let's Encrypt), this works as-is —
# the registry serves a publicly trusted cert.
#
# ONLY in sslip.io/HTTP mode: dind must be told to trust the plain-HTTP
# registry — swap the services block for:
#   services:
#     - name: docker:27.3-dind
#       alias: docker
#       command: ["--insecure-registry=<terraform output registry_host>"]

stages:
  - build

build-image:
  stage: build
  image: docker:27.3
  services:
    - name: docker:27.3-dind
      alias: docker
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
  before_script:
    # dind takes a few seconds to come up
    - until docker info >/dev/null 2>&1; do sleep 2; done
    - docker login -u gitlab-ci-token -p "$CI_JOB_TOKEN" "$CI_REGISTRY"
  script:
    - docker build -t "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA" -t "$CI_REGISTRY_IMAGE:latest" .
    - docker push "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA"
    - docker push "$CI_REGISTRY_IMAGE:latest"
